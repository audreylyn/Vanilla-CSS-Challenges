<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Navigation Bar Challenge</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        img {
            max-width: 100%;
            display: block;
            width: 24px;
        }

        .navbar {
            background: #000;
            height: 48px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            border-bottom: 10px solid rgb(78, 78, 78);
            padding-inline: 15px;
            padding-block: 25px;
        }

        ul {
            list-style: none;
        }

        main {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .flex {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 5px;
        }

        a {
            text-decoration: none;
            color: white;
        }

        .coder-x {
            font-weight: 700;
        }

        ul.navlinks > li, .login > article {
           font-size: 0.7rem;
           color: rgb(128, 126, 126);
        }

        .buttons > button {
            background: #5046e5;
            padding: .8em;
            border: none;
            border-radius: 5px;
            font-size: 0.7rem;
            color: white;
        }

        .dropdown-menu-learn {
            content: "\f107";
            	margin-left: 0.2em;
	color: #a1a1aa;
	cursor: pointer;
        }


    </style>
</head>
<body>

    <main>
        <div class="navbar">
            <div class="coder-x flex">
                <img src="./assets/icon-for-coder-X.png" alt="icon-for-coder-X">
                <a href="#" class="coder-x">coder-x</a>
            </div>
            <ul class="navlinks flex">
                <li class="dropdown-menu-learn">Learn</li>
                <li class="dropdown-menu">Practice</li>
                <li class="dropdown-menu">Company</li>
                <li class="dropdown-menu">Pricing</li>
            </ul>
            <div class="buttons login flex">
                <a href="#">Login</a>
                <button>Get Started</button>
            </div>
        </div>
    </main>
    
</body>
</html>
