<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- SEO: Added unique and descriptive title and meta description [1-3] -->
    <title>Apple Inc. Company Overview - Clément's Post</title>
    <meta name="description" content="Read Clément's post about Apple Inc., the American multinational technology company specializing in consumer electronics and software.">

    <style>
        :root {
            --clr-blue: #0000ff;
            --clr-red: red;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-image: linear-gradient(90deg, var(--clr-blue), var(--clr-red));
            font-family: sans-serif;
        }

        img {
            max-width: 100%;
            height: auto; /* Ensures responsive image scaling [4] */
            display: block;
        }

        .container {
            max-inline-size: 700px;
            margin-inline: auto;
            background-color: #fff;
            border: 0.5px solid black;
            box-shadow: 0 0 20px 10px black;
            margin-top: 80px;
        } 

        /* Flexbox layout for efficient rendering [5] */
        .flex, .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        ul {
            list-style: none;
        }

        .wrapper {
            display: flex;
            flex-direction: column;
        }

        .wrapper > *:not(.image-post) {
            padding-inline: 10px;
            padding-block: 10px;
        }

        /* SEO/Accessibility: Styling buttons to remove default browser button styles */
        button.icon-btn {
            background: none;
            border: none;
            cursor: pointer;
        }
        
        h1.author-name {
            font-size: 1rem;
            font-weight: bold;
        }
    </style>
    
    <!-- SEO: JSON-LD Structured Data to help search engines understand the content [6] -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SocialMediaPosting",
      "author": {
        "@type": "Person",
        "name": "Clément"
      },
      "headline": "Apple Inc. Overview",
      "image": "https://i.ibb.co/0p5691d/t-l-chargement.jpg",
      "articleBody": "Apple Inc. is an American multinational technology company that specializes in consumer electronics, computer software, and online services..."
    }
    </script>
</head>
<body>
    <main class="container">
        <!-- SEO: Semantic HTML <article> defines standalone content [7, 8] -->
        <article class="ig-post">
            <div class="wrapper">
                <!-- SEO: <header> defines introductory content [8, 9] -->
                <header class="flex">
                    <!-- SEO: Proper heading hierarchy establishes the primary subject [10, 11] -->
                    <h1 class="author-name">Clément</h1>
                    <!-- SEO/A11y: Empty alt for decorative icon, button instead of link [12, 13] -->
                    <button class="icon-btn" aria-label="More options"><img src="./assets/options.svg" alt=""></button>
                </header>

                <!-- SEO: <figure> creates a container for media and its description [14] -->
                <figure class="image-post">
                    <!-- SEO: Added descriptive alt text, lazy loading, and explicit dimensions [15-17] -->
                    <img src="https://i.ibb.co/0p5691d/t-l-chargement.jpg" alt="A promotional overview of Apple Inc." width="700" height="700" loading="lazy">
                    
                    <!-- SEO: <figcaption> associates the text directly with the image [14, 18] -->
                    <figcaption class="paragraph-post" style="padding-inline: 10px; padding-bottom: 10px;">
                        <p><strong>Clément</strong> Apple Inc. is an American multinational technology company that specializes in consumer electronics, computer software, and online services. Apple is the world's largest technology company by revenue (totaling $274.5 billion in 2020) and, since January 2021, the world's most valuable company. As of 2021, Apple is the world's fourth-largest PC vendor by unit sales, and fourth-largest smartphone manufacturer. It is one of the Big Five American information technology companies, along with Amazon, Google, Microsoft, and Facebook.</p>
                    </figcaption>
                </figure>

                <div class="toolbar">
                    <ul class="flex">
                        <!-- SEO/A11y: Replaced <a> tags with <button> tags and aria-labels [12, 19] -->
                        <li><button class="icon-btn" aria-label="Like post"><img src="./assets/like.svg" alt=""></button></li>
                        <li><button class="icon-btn" aria-label="Comment on post"><img src="./assets/comment.svg" alt=""></button></li>
                        <li><button class="icon-btn" aria-label="Share post"><img src="./assets/transfer.svg" alt=""></button></li>
                    </ul>
                    <div>
                        <button class="icon-btn" aria-label="Bookmark post">
                            <img src="./assets/bookmark.svg" alt="">
                        </button>
                    </div>
                </div>
            </div>
        </article>
    </main>
</body>
</html>
